    <main>
        <h1>Suggestion Box</h1>
        <section id="Suggestion_Box">
                <form action="http://httpbin.org/ghyet" method="get">
                    <fieldset>
                        <p>
                            <label for="name">Name:</label>
                            <input type="text" name="name" id="name" placeholder="Ahmed" required>
                        </p>
                        <p>
                            <label for="email">Email:</label>
                            <input type="email" name="email" id="email" placeholder="example@google.com" required>
                        </p>
                        <p>
                            <label for="suggestion">Suggestion</label>
                            <br>
                            <textarea name="suggestion" id="suggestion" cols="50" rows="10" placeholder="Type ypur suggestions here"></textarea>
                        </p>
                        <button type="submit">Submit</button>
                    </fieldset>
                </form>
        </section>
    </main>

        <a href="Suggestion_Page.html"> <h3>Propose suggestions</h3></a>
